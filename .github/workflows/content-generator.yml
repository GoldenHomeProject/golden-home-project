name: GHP Content Engine (Agent 2 — Flywheel S2)

# Runs daily at 06:00 UTC (02:00 ET), 1h after trend-scout
# Consumes social/trend_feed.json
# Produces 3 Reel scripts per day using AIDA + Grand Slam Offer frameworks
# Outputs: automation/scripts/reel-<date>-NNN.json + queue entries

on:
  # Cron disabled 2026-05-06 per CLAUDE_GHP_CEO.md.
  # Reel scripts have produced $0 across 902+ Amazon clicks. Stop generating until offer/audience pivot.
  # schedule:
  #   - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node (for Claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run content engine
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python3 automation/content_engine.py

      - name: Run content quality gate (rejects off-brand scripts)
        run: python3 automation/content_quality_gate.py

      - name: Commit scripts and queue updates
        run: |
          git config user.name "GHP Content Engine"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add automation/scripts/ social/post_queue.json automation/content-review-queue/ AGENT_LOG.md || true
          git diff --staged --quiet || git commit -m "Content engine: $(date -u +%Y-%m-%d)"
          git push || true
