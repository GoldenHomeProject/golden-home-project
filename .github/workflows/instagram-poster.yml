name: GHP Instagram Poster

# Posts ready-to-publish Instagram content via Meta Graph API
# Input: JSON file at social/post_queue.json (one post at a time — oldest first)
# After posting, moves entry to social/posted_archive.json

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'Public image URL — leave blank to pop next from post_queue.json'
        required: false
        default: ''
        type: string
      caption:
        description: 'Instagram caption — leave blank when using queue'
        required: false
        default: ''
        type: string
      media_type:
        description: 'IMAGE, REELS, or CAROUSEL_ALBUM (queue mode only)'
        required: false
        default: 'IMAGE'
        type: choice
        options:
          - IMAGE
          - REELS
          - CAROUSEL_ALBUM
  schedule:
    # 2026-05-29 CADENCE CUT: was 2x/day (14:00 + 22:00 UTC).
    # Dropped 14:00 UTC slot — posting 2x/day of 0-engagement content was
    # actively damaging the algo profile (last 30d Associates clicks
    # collapsed 902→62 = -93%; IG inbound likes per post ≈ 0). Halving
    # the volume halves the algo-poison rate without killing the posting
    # habit. 22:00 UTC = 6PM ET (highest US engagement window).
    # KILL CRITERION: if inbound likes per post still ≤1 after 14 days
    # (2026-06-12 review), drop to 3x/week.
    - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Post to Instagram via Meta Graph API
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IMAGE_URL: ${{ inputs.image_url }}
          CAPTION: ${{ inputs.caption }}
          MEDIA_TYPE: ${{ inputs.media_type }}
        run: |
          python3 << 'PYTHON'
          import os, json, time, requests, sys
          from pathlib import Path
          from datetime import datetime, timezone

          TOKEN = os.environ["META_ACCESS_TOKEN"]
          IG_ID = os.environ["IG_BUSINESS_ACCOUNT_ID"]
          GRAPH = "https://graph.facebook.com/v21.0"

          # Mode A: manual dispatch with inputs (already routed through env:)
          image_url = os.environ.get("IMAGE_URL", "").strip()
          caption   = os.environ.get("CAPTION", "").strip()
          media_type = os.environ.get("MEDIA_TYPE", "IMAGE").strip() or "IMAGE"

          # Mode B: scheduled — pull next post from social/post_queue.json
          queue_path = Path("social/post_queue.json")
          archive_path = Path("social/posted_archive.json")
          queue = []
          archived = []
          if archive_path.exists():
              archived = json.loads(archive_path.read_text())
          archived_urls = {a.get("image_url") for a in archived if a.get("image_url")}

          # Carousel-aware: image_urls (plural) for CAROUSEL_ALBUM,
          # image_url (singular) for IMAGE/REELS.
          image_urls: list[str] = []
          used_queue = False
          if not image_url:
              if not queue_path.exists():
                  print("No queue and no manual inputs — nothing to post.")
                  sys.exit(0)
              queue = json.loads(queue_path.read_text())
              # Defense against stale queue entries (manual posts don't pop queue).
              pruned = []
              for q in queue:
                  iurl = q.get("image_url")
                  iurls = q.get("image_urls") or []
                  if iurl and iurl in archived_urls:
                      continue
                  if iurls and any(u in archived_urls for u in iurls):
                      continue
                  pruned.append(q)
              if len(pruned) != len(queue):
                  print(f"Pruned {len(queue) - len(pruned)} already-posted entries from queue.")
                  queue = pruned

              # READY = has image_url OR image_urls AND not awaiting_video
              ready_idx = next(
                  (i for i, q in enumerate(queue)
                   if q.get("status", "ready") == "ready" and
                      (q.get("image_url") or q.get("image_urls"))),
                  None,
              )
              if ready_idx is None:
                  not_ready = sum(1 for q in queue if q.get("status") == "awaiting_video")
                  print(f"No ready entries in queue ({not_ready} awaiting video). Nothing to post.")
                  queue_path.write_text(json.dumps(queue, indent=2))
                  sys.exit(0)

              next_post = queue.pop(ready_idx)
              image_url  = next_post.get("image_url", "") or ""
              image_urls = next_post.get("image_urls") or []
              caption    = next_post["caption"]
              media_type = next_post.get("media_type", "IMAGE")
              used_queue = True
              print(f"Picked from queue: {next_post.get('name', next_post.get('id', 'unnamed'))}")
          else:
              # Manual dispatch: refuse duplicate posts to protect algo trust.
              if image_url in archived_urls:
                  print("REFUSING: image_url already published. Aborting to prevent duplicate post.")
                  sys.exit(0)

          print(f"Posting media_type={media_type}")
          if media_type == "CAROUSEL_ALBUM":
              print(f"Carousel children: {len(image_urls)}")
          else:
              print(f"Image URL: {image_url}")
          print(f"Caption length: {len(caption)} chars")

          # ---- Helpers ----
          def poll_until_finished(cid: str, label: str = "") -> None:
              for attempt in range(30):
                  status_r = requests.get(
                      f"{GRAPH}/{cid}",
                      params={"fields": "status_code", "access_token": TOKEN},
                      timeout=30,
                  )
                  status = status_r.json().get("status_code", "UNKNOWN")
                  print(f"  {label} attempt {attempt+1}: status={status}")
                  if status == "FINISHED":
                      return
                  if status in ("ERROR", "EXPIRED"):
                      print(f"Container failed: {status_r.text}")
                      sys.exit(1)
                  time.sleep(5)

          # ---- Build container(s) ----
          if media_type == "CAROUSEL_ALBUM":
              # Meta carousel flow:
              # 1) one is_carousel_item container per child image
              # 2) one parent container with media_type=CAROUSEL, children=ids
              # 3) media_publish on the parent
              if len(image_urls) < 2 or len(image_urls) > 10:
                  print(f"ERROR: CAROUSEL_ALBUM requires 2-10 images, got {len(image_urls)}")
                  sys.exit(1)
              child_ids: list[str] = []
              for i, child_url in enumerate(image_urls):
                  cr = requests.post(
                      f"{GRAPH}/{IG_ID}/media",
                      data={
                          "image_url": child_url,
                          "is_carousel_item": "true",
                          "access_token": TOKEN,
                      },
                      timeout=60,
                  )
                  print(f"Child {i+1}/{len(image_urls)} create: {cr.status_code} {cr.text[:200]}")
                  cr.raise_for_status()
                  child_ids.append(cr.json()["id"])
              # Parent container
              parent_r = requests.post(
                  f"{GRAPH}/{IG_ID}/media",
                  data={
                      "caption": caption,
                      "media_type": "CAROUSEL",
                      "children": ",".join(child_ids),
                      "access_token": TOKEN,
                  },
                  timeout=60,
              )
              print(f"Parent create: {parent_r.status_code} {parent_r.text[:300]}")
              parent_r.raise_for_status()
              container_id = parent_r.json()["id"]
              poll_until_finished(container_id, "parent")
          else:
              # IMAGE / REELS
              params = {
                  "image_url": image_url,
                  "caption": caption,
                  "access_token": TOKEN,
              }
              if media_type == "REELS":
                  params["media_type"] = "REELS"
                  params["video_url"] = params.pop("image_url")
              r = requests.post(f"{GRAPH}/{IG_ID}/media", data=params, timeout=60)
              print(f"Create status: {r.status_code} {r.text[:300]}")
              r.raise_for_status()
              container_id = r.json()["id"]
              poll_until_finished(container_id, "single")

          # ---- Publish ----
          publish_url = f"{GRAPH}/{IG_ID}/media_publish"
          pub_r = requests.post(
              publish_url,
              data={"creation_id": container_id, "access_token": TOKEN},
              timeout=60,
          )
          print(f"Publish status: {pub_r.status_code} {pub_r.text[:300]}")
          pub_r.raise_for_status()
          media_id = pub_r.json()["id"]

          # ---- Archive ----
          archive_entry: dict = {
              "media_id": media_id,
              "posted_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "caption": caption,
              "media_type": media_type,
          }
          if media_type == "CAROUSEL_ALBUM":
              archive_entry["image_urls"] = image_urls
              # also record first slide in image_url so dedupe checks work
              archive_entry["image_url"] = image_urls[0]
          else:
              archive_entry["image_url"] = image_url
          archived.append(archive_entry)
          archive_path.write_text(json.dumps(archived, indent=2))

          if used_queue:
              queue_path.write_text(json.dumps(queue, indent=2))

          print(f"PUBLISHED: media_id={media_id}")
          PYTHON

      - name: Commit archive + queue updates
        run: |
          git config user.name "GHP Instagram Bot"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add social/post_queue.json social/posted_archive.json || true
          git diff --staged --quiet || git commit -m "IG post: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
