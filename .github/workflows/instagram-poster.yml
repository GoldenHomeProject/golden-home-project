name: GHP Instagram Poster

# Posts ready-to-publish Instagram content via Meta Graph API
# Input: JSON file at social/post_queue.json (one post at a time — oldest first)
# After posting, moves entry to social/posted_archive.json

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'Public image URL (raw.githubusercontent.com)'
        required: true
        type: string
      caption:
        description: 'Instagram caption (keywords front-loaded, 3-5 hashtags)'
        required: true
        type: string
      media_type:
        description: 'IMAGE or REELS'
        required: false
        default: 'IMAGE'
        type: choice
        options:
          - IMAGE
          - REELS
  schedule:
    # Runs at 10 AM ET and 6 PM ET daily (peak engagement windows)
    - cron: '0 14,22 * * *'

permissions:
  contents: write

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Post to Instagram via Meta Graph API
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IMAGE_URL: ${{ inputs.image_url }}
          CAPTION: ${{ inputs.caption }}
          MEDIA_TYPE: ${{ inputs.media_type }}
        run: |
          python3 << 'PYTHON'
          import os, json, time, requests, sys
          from pathlib import Path
          from datetime import datetime, timezone

          TOKEN = os.environ["META_ACCESS_TOKEN"]
          IG_ID = os.environ["IG_BUSINESS_ACCOUNT_ID"]
          GRAPH = "https://graph.facebook.com/v21.0"

          # Mode A: manual dispatch with inputs (already routed through env:)
          image_url = os.environ.get("IMAGE_URL", "").strip()
          caption   = os.environ.get("CAPTION", "").strip()
          media_type = os.environ.get("MEDIA_TYPE", "IMAGE").strip() or "IMAGE"

          # Mode B: scheduled — pull next post from social/post_queue.json
          queue_path = Path("social/post_queue.json")
          archive_path = Path("social/posted_archive.json")
          queue = []
          archived = []
          if archive_path.exists():
              archived = json.loads(archive_path.read_text())
          archived_urls = {a.get("image_url") for a in archived if a.get("image_url")}

          used_queue = False
          if not image_url:
              if not queue_path.exists():
                  print("No queue and no manual inputs — nothing to post.")
                  sys.exit(0)
              queue = json.loads(queue_path.read_text())
              # Defense against stale queue entries (manual posts don't pop queue).
              pruned = [q for q in queue if q.get("image_url") not in archived_urls]
              if len(pruned) != len(queue):
                  print(f"Pruned {len(queue) - len(pruned)} already-posted entries from queue.")
                  queue = pruned

              # Skip entries that aren't ready yet (reel-producer hasn't filled video_url).
              # Pop the first READY entry, leaving awaiting_video entries in place.
              ready_idx = next(
                  (i for i, q in enumerate(queue)
                   if q.get("status", "ready") == "ready" and q.get("image_url")),
                  None,
              )
              if ready_idx is None:
                  not_ready = sum(1 for q in queue if q.get("status") == "awaiting_video")
                  print(f"No ready entries in queue ({not_ready} awaiting video). Nothing to post.")
                  queue_path.write_text(json.dumps(queue, indent=2))
                  sys.exit(0)

              next_post = queue.pop(ready_idx)
              image_url  = next_post["image_url"]
              caption    = next_post["caption"]
              media_type = next_post.get("media_type", "IMAGE")
              used_queue = True
              print(f"Picked from queue: {next_post.get('name', 'unnamed')}")
          else:
              # Manual dispatch: refuse duplicate posts to protect algo trust.
              if image_url in archived_urls:
                  print("REFUSING: image_url already published. Aborting to prevent duplicate post.")
                  sys.exit(0)

          print(f"Posting media_type={media_type}")
          print(f"Image URL: {image_url}")
          print(f"Caption length: {len(caption)} chars")

          # Step 1: create media container
          create_url = f"{GRAPH}/{IG_ID}/media"
          params = {
              "image_url": image_url,
              "caption": caption,
              "access_token": TOKEN,
          }
          if media_type == "REELS":
              params["media_type"] = "REELS"
              params["video_url"] = params.pop("image_url")

          r = requests.post(create_url, data=params, timeout=60)
          print(f"Create status: {r.status_code}")
          print(r.text[:500])
          r.raise_for_status()
          container_id = r.json()["id"]

          # Step 2: poll until FINISHED (Reels need processing time)
          for attempt in range(30):
              status_r = requests.get(
                  f"{GRAPH}/{container_id}",
                  params={"fields": "status_code", "access_token": TOKEN},
                  timeout=30,
              )
              status = status_r.json().get("status_code", "UNKNOWN")
              print(f"  attempt {attempt+1}: status={status}")
              if status == "FINISHED":
                  break
              if status in ("ERROR", "EXPIRED"):
                  print(f"Container failed: {status_r.text}")
                  sys.exit(1)
              time.sleep(5)

          # Step 3: publish
          publish_url = f"{GRAPH}/{IG_ID}/media_publish"
          pub_r = requests.post(
              publish_url,
              data={"creation_id": container_id, "access_token": TOKEN},
              timeout=60,
          )
          print(f"Publish status: {pub_r.status_code}")
          print(pub_r.text[:500])
          pub_r.raise_for_status()
          media_id = pub_r.json()["id"]

          # Step 4: archive
          archived.append({
              "media_id": media_id,
              "posted_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "image_url": image_url,
              "caption": caption,
              "media_type": media_type,
          })
          archive_path.write_text(json.dumps(archived, indent=2))

          if used_queue:
              queue_path.write_text(json.dumps(queue, indent=2))

          print(f"PUBLISHED: media_id={media_id}")
          PYTHON

      - name: Commit archive + queue updates
        run: |
          git config user.name "GHP Instagram Bot"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add social/post_queue.json social/posted_archive.json || true
          git diff --staged --quiet || git commit -m "IG post: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
