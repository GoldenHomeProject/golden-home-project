name: GHP Blog Writer (Agent 4 — Flywheel S3)

# Runs 5x/week (Mon-Fri) at 08:00 UTC
# Writes one 1,800-2,400 word SEO blog post per run
# Target: 260 posts/year, compounding organic traffic
# Based on highest-composite trend from social/trend_feed.json

on:
  # Re-enabled 2026-05-11 per CEO directive (parallel tracks).
  # Cadence reduced from 5x/week to 1x/week (Wednesday) — keeps the 6/5 GSC sandbox test
  # on the existing 8 COVER posts readable. 1 post/week into non-COVER clusters
  # (drawn from social/RESEARCH_fallback_clusters.md) widens the bet without polluting the
  # primary signal. Hard rule (enforced in scripts/blog_writer.py downstream of this trigger):
  # NEVER publish another COVER-cluster post until the 6/5 evaluation.
  schedule:
    - cron: '0 8 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node (for Claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run blog writer
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python3 automation/blog_writer.py

      - name: Commit new post + index
        run: |
          git config user.name "GHP Blog Writer"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add blog/ || true
          git diff --staged --quiet || git commit -m "Blog post: $(date -u +%Y-%m-%d)"
          git push || true
