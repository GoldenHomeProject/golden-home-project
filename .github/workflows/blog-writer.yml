name: GHP Blog Writer (Agent 4 — Flywheel S3)

# Runs 5x/week (Mon-Fri) at 08:00 UTC
# Writes one 1,800-2,400 word SEO blog post per run
# Target: 260 posts/year, compounding organic traffic
# Based on highest-composite trend from social/trend_feed.json

on:
  # Cron disabled 2026-05-06 per CLAUDE_GHP_CEO.md rule #1 (1 post/week max).
  # Auto-published 8th near-duplicate COVER post 2026-05-06, hitting kill criterion threshold.
  # Re-enable only after Path B/C decision is made and a non-duplicate cluster is selected.
  # schedule:
  #   - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node (for Claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run blog writer
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python3 automation/blog_writer.py

      - name: Commit new post + index
        run: |
          git config user.name "GHP Blog Writer"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add blog/ || true
          git diff --staged --quiet || git commit -m "Blog post: $(date -u +%Y-%m-%d)"
          git push || true
