name: GHP ASIN Discoverer (Agent 1.5 — backup, manual only)

# PRIMARY HOST: raspberrypi5-ts (residential IP).
# See pi/asin-discoverer/README.md for the production schedule + ops.
#
# This workflow is kept as a manual fallback only. The auto-trigger
# (workflow_run after Trend Scout) was removed on 2026-05-27 after the
# dispatch test confirmed Amazon serves a Robot Check / interstitial to
# GitHub Actions runner IPs — the search-result selector never renders.
#
# When to use this workflow:
#   - Pi is offline / power outage / internet down and you need to
#     verify the GH Actions plumbing hasn't rotted
#   - Amazon ever stops bot-blocking GH runners (unlikely)
#
# SECURITY: No untrusted user input is ever expanded into a run: command.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium
        run: |
          pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Pull latest trend_feed.json
        run: git pull --rebase origin main

      - name: Run ASIN Discoverer
        run: python automation/asin_discoverer.py

      - name: Commit registry updates
        run: |
          git config user.name "GHP ASIN Discoverer Bot"
          git config user.email "goldenhomeprojectllc@gmail.com"
          if git diff --quiet social/dm_keyword_registry.json; then
            echo "No registry changes — nothing to commit."
            exit 0
          fi
          git add social/dm_keyword_registry.json
          STAMP=$(date -u +%Y-%m-%dT%H:%MZ)
          git commit -m "asin-discoverer: vetted ASIN(s) ${STAMP}"
          # Retry push once if remote moved (engagement bot pushes frequently)
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt ${attempt} failed; retrying"
            sleep 5
          done
