name: GHP Carousel Generator (Agent 2b — saves-driven format)

# Produces 5-slide IG carousels. Structurally different from the reel
# pipeline: no AI imagery, no robotic voiceover, saves-driven format.
# See automation/carousel_generator.py for full design rationale.
#
# Runs daily at 07:00 UTC (1h after Trend Scout's 05:00 UTC, 1h after
# content-engine's 06:00 UTC — so the registry is fresh).
#
# Output: social/carousels/<date>-<asin>/ (5 PNGs) + post_queue.json
# append with media_type=CAROUSEL_ALBUM. instagram-poster.yml's 22:00 UTC
# slot then picks it up.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Set up Node (for Claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate carousel
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python3 automation/carousel_generator.py

      - name: Commit slides + queue
        run: |
          git config user.name "GHP Carousel Bot"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add social/carousels social/post_queue.json social/agent_log.md || true
          git diff --staged --quiet || git commit -m "carousel: $(date -u +%Y-%m-%d) generated"
          # Engagement-bot races: 3x retry
          for i in 1 2 3; do
            git pull --rebase --quiet origin main && git push --quiet origin main && break
            sleep 5
          done
