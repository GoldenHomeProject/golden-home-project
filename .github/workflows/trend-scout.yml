name: GHP Trend Scout (Agent 1 — Flywheel S1)

# Runs daily at 05:00 UTC (01:00 ET)
# Scouts Reddit + lets Claude rank product opportunities
# Output: social/trend_feed.json → consumed by content-generator.yml

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node (for Claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run trend scout
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python3 automation/trend_scout.py

      - name: Commit trend feed and agent log
        run: |
          git config user.name "GHP Trend Bot"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add social/trend_feed.json automation/trends/ AGENT_LOG.md || true
          git diff --staged --quiet || git commit -m "Trend scout: $(date -u +%Y-%m-%d)"
          git push || true
