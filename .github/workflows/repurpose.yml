name: GHP Repurposer (Agent 5 — Flywheel S5)

# Runs Mondays at 09:00 UTC
# Takes latest blog post → 5 Reels + 5 Pins + 1 Email + 10 microcopy hooks
# Content multiplier: 1 asset → 20 derivatives

on:
  # Cron disabled 2026-05-06 per CLAUDE_GHP_CEO.md.
  # Multiplying $0-revenue content into more $0-revenue content. Pause until source content earns.
  # schedule:
  #   - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repurpose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node (for Claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run repurposer
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python3 automation/repurpose.py

      - name: Commit derivatives
        run: |
          git config user.name "GHP Repurposer"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add automation/scripts/ automation/pinterest/ automation/email/ automation/microcopy/ social/post_queue.json || true
          git diff --staged --quiet || git commit -m "Repurpose: $(date -u +%Y-%m-%d)"
          git push || true
